services:
  api:
    build: .
    container_name: ttt-api
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ttt-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
